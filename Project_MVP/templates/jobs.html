<!DOCTYPE html>
<html>
<head>
    <title>Jobs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<a href="/rank" class="btn btn-warning mb-3">Rank My Resume</a>

<table class="table table-bordered">
<tr class="table-dark">
    <th>Job</th><th>Company</th><th>Skills</th><th>Action</th>
</tr>
{% for job in jobs %}
<tr>
    <td>{{ job.job_title }}</td>
    <td>{{ job.company }}</td>
    <td>{{ job.required_skills | join(", ") }}</td>
    <td><a href="/apply/{{ job.id }}" class="btn btn-primary">Apply</a></td>
</tr>
{% endfor %}
</table>

</body>
</html>
